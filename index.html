<!DOCTYPE html>
<html>
<head>
  <title>Creativerse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }
    .hero {
      padding: 120px 20px;
    }
    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    .primary {
      background: #4F7BFF;
      color: white;
    }
    .section {
      padding: 80px 20px;
    }
    .card {
      max-width: 700px;
      margin: 30px auto;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Creativerse</h1>
    <h2>Turn Memories Into Creations</h2>
    <p>Create personalized cards and custom songs instantly with AI.</p>

    <button class="primary">Create a Card</button>
    <button>Make a Song</button>
  </div>

  <div class="section">
    <h2>AI Card Creator</h2>
    <p>Create beautiful personalized cards for birthdays, holidays, anniversaries, and special moments.</p>

    <div class="card">
      <h2>AI Song Creator</h2>
      <p>Turn memories, stories, and celebrations into custom songs.</p>
    </div>
  </div>

</body>
</html>
