<!DOCTYPE html>
<html>
<head>
  <title>Make a Song - Creativerse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      text-align: center;
      padding: 60px 20px;
      margin: 0;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    input, textarea, select {
      width: 100%;
      max-width: 500px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    textarea {
      min-height: 120px;
    }
    button {
      padding: 12px 22px;
      background: #4F7BFF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    #result {
      margin-top: 40px;
      max-width: 650px;
      margin-left: auto;
      margin-right: auto;
      background: #111827;
      padding: 24px;
      border-radius: 12px;
      text-align: left;
      white-space: pre-line;
    }
    a {
      color: #9bb4ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <p><a href="index.html">← Back to Home</a></p>
    <h1>Make a Song</h1>
    <p>Turn memories into creations</p>

    <input id="person" placeholder="Who is the song for?">
    <input id="occasion" placeholder="Occasion (birthday, retirement, anniversary)">
    
    <select id="mood">
      <option value="">Choose a mood</option>
      <option value="heartfelt">Heartfelt</option>
      <option value="funny">Funny</option>
      <option value="celebratory">Celebratory</option>
      <option value="romantic">Romantic</option>
    </select>

    <select id="genre">
      <option value="">Choose a genre</option>
      <option value="pop">Pop</option>
      <option value="country">Country</option>
      <option value="ballad">Ballad</option>
      <option value="gospel">Gospel</option>
    </select>

    <textarea id="details" placeholder="Share memories, qualities, or special details to include"></textarea>

    <button onclick="generateSong()">Generate Song</button>

    <div id="result"></div>
  </div>

  <script>
    function generateSong() {
      const person = document.getElementById("person").value;
      const occasion = document.getElementById("occasion").value;
      const mood = document.getElementById("mood").value;
      const genre = document.getElementById("genre").value;
      const details = document.getElementById("details").value;

      const song = `Song for ${person || "Someone Special"}

Occasion: ${occasion || "A Special Day"}
Mood: ${mood || "Warm"}
Genre: ${genre || "Pop"}

Verse 1
Today we celebrate you in every way,
Bringing love and laughter to this special day.
${details ? details : "Memories fill the room and hearts shine bright,"}
We sing this song for you tonight.

Chorus
This is your moment, this is your song,
A memory to hold and carry along.
With joy and love in every line,
Today we celebrate your life and shine.

From,
Creativerse`;

      document.getElementById("result").innerText = song;
    }
  </script>
</body>
</html>
