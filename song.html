<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make a Song - Creativerse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      text-align: center;
      padding: 60px 20px;
      margin: 0;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    input, textarea, select {
      width: 100%;
      max-width: 500px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
    }

    button {
      padding: 12px 22px;
      background: #4F7BFF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      margin-right: 8px;
    }

    .song-result {
      margin-top: 40px;
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      color: #222;
      padding: 30px;
      border-radius: 16px;
      max-width: 650px;
      margin-left: auto;
      margin-right: auto;
      font-size: 18px;
      line-height: 1.7;
      white-space: pre-line;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: left;
      min-height: 80px;
      box-sizing: border-box;
    }

    a {
      color: #9bb4ff;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 20px;
    }

    .action-buttons {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html">← Back to Home</a>

    <h1>Make a Song</h1>
    <p>Turn memories into creations</p>

    <input id="person" placeholder="Who is the song for?">
    <input id="occasion" placeholder="Occasion (birthday, retirement, anniversary)">

    <select id="mood">
      <option value="Heartfelt">Heartfelt</option>
      <option value="Funny">Funny</option>
      <option value="Celebratory">Celebratory</option>
      <option value="Romantic">Romantic</option>
    </select>

    <select id="genre">
      <option value="Pop">Pop</option>
      <option value="Country">Country</option>
      <option value="Ballad">Ballad</option>
      <option value="Gospel">Gospel</option>
    </select>

    <textarea id="details" placeholder="Share memories, qualities, or special details"></textarea>

    <button id="generateSongBtn">Generate Song</button>

    <div class="action-buttons">
      <button onclick="copySong()">📋 Copy Song</button>
      <button onclick="generateSong()">🔁 Regenerate</button>
    </div>

    <div id="result" class="song-result">Your song will appear here.</div>
  </div>

  <script>
    async function generateSong() {
      const person = document.getElementById("person").value;
      const occasion = document.getElementById("occasion").value;
      const mood = document.getElementById("mood").value;
      const genre = document.getElementById("genre").value;
      const details = document.getElementById("details").value;
      const result = document.getElementById("result");

      result.innerText = "Writing your song...";

      try {
        const response = await fetch("/api/song", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            person: person,
            occasion: occasion,
            mood: mood,
            genre: genre,
            details: details
          })
        });

        const rawText = await response.text();

        if (!response.ok) {
          result.innerText = rawText || "Something went wrong.";
          return;
        }

        try {
          const data = JSON.parse(rawText);
          result.innerText = data.song || "No song was returned.";
        } catch (e) {
          result.innerText = rawText;
        }

      } catch (error) {
        result.innerText = "Could not reach the song generator.";
      }
    }

    function copySong() {
      const text = document.getElementById("result").innerText;
      navigator.clipboard.writeText(text);
      alert("Song copied!");
    }

    document.getElementById("generateSongBtn").addEventListener("click", generateSong);
  </script>
</body>
</html>
