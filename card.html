<!DOCTYPE html>
<html>
<head>
  <title>Create a Card - Creativerse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      text-align: center;
      padding: 60px 20px;
      margin: 0;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    input, textarea, select {
      width: 100%;
      max-width: 500px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    textarea {
      min-height: 120px;
    }
    button {
      padding: 12px 22px;
      background: #4F7BFF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    #result {
      margin-top: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      background: #111827;
      padding: 24px;
      border-radius: 12px;
      text-align: left;
      white-space: pre-line;
    }
    a {
      color: #9bb4ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <p><a href="index.html">← Back to Home</a></p>
    <h1>Create a Card</h1>
    <p>Turn memories into creations</p>

    <input id="person" placeholder="Who is the card for?">
    
    <input id="occasion" placeholder="Occasion (birthday, anniversary, holiday)">
    
    <select id="tone">
      <option value="">Choose a tone</option>
      <option value="heartfelt">Heartfelt</option>
      <option value="funny">Funny</option>
      <option value="sweet">Sweet</option>
      <option value="formal">Formal</option>
    </select>
    
    <textarea id="details" placeholder="Share a few memories or details to include"></textarea>
    
    <button onclick="generateCard()">Generate Card</button>

    <div id="result"></div>
  </div>

  <script>
    function generateCard() {
      const person = document.getElementById("person").value;
      const occasion = document.getElementById("occasion").value;
      const tone = document.getElementById("tone").value;
      const details = document.getElementById("details").value;

      const card = `Dear ${person || "Friend"},

Happy ${occasion || "special day"}!

This message comes with a ${tone || "warm"} note just for you.
${details ? "Thinking of: " + details : ""}

Wishing you joy, love, and unforgettable memories today.

With love,
Creativerse`;

      document.getElementById("result").innerText = card;
    }
  </script>
</body>
</html>
