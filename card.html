<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create a Card - Creativerse</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      text-align: center;
      padding: 60px 20px;
      margin: 0;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    input, textarea, select {
      width: 100%;
      max-width: 500px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 120px;
    }
    button {
      padding: 12px 22px;
      background: #4F7BFF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    #result {
      margin-top: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      background: #111827;
      padding: 24px;
      border-radius: 12px;
      text-align: left;
      white-space: pre-line;
      box-sizing: border-box;
    }
    a {
      color: #9bb4ff;
      text-decoration: none;
      .card-result {
  margin-top:40px;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:#222;
  padding:30px;
  border-radius:16px;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
  font-size:18px;
  line-height:1.6;
  white-space:pre-line;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
    }
  </style>
</head>
<body>
  <div class="container">
    <p><a href="index.html">← Back to Home</a></p>
    <h1>Create a Card</h1>
    <p>Turn memories into creations</p>

    <input id="person" placeholder="Who is the card for?">
    <input id="occasion" placeholder="Occasion (birthday, anniversary, holiday)">

    <select id="tone">
      <option value="">Choose a tone</option>
      <option value="heartfelt">Heartfelt</option>
      <option value="funny">Funny</option>
      <option value="sweet">Sweet</option>
      <option value="formal">Formal</option>
    </select>

    <textarea id="details" placeholder="Share a few memories or details to include"></textarea>

    <button onclick="generateCard()">Generate Card</button>

    <div id="result" class="card-result"></div>
  </div>

  <script>
    async function generateCard() {
      const person = document.getElementById("person").value;
      const occasion = document.getElementById("occasion").value;
      const tone = document.getElementById("tone").value;
      const details = document.getElementById("details").value;
      const result = document.getElementById("result");

      result.innerText = "Creating your card...";

      try {
        const response = await fetch("/api/card", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            person: person,
            occasion: occasion,
            tone: tone,
            details: details
          })
        });

        const data = await response.json();

        if (!response.ok) {
          result.innerText = data.error || "Something went wrong.";
          return;
        }

        result.innerText = data.card;
      } catch (error) {
        result.innerText = "Sorry, there was a problem connecting to the AI service.";
      }
    }
  </script>
</body>
</html>
